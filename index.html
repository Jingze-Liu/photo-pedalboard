<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHOTO PEDALBOARD</title>
<style>
  :root {
    --bg: #4a3826;            /* 暖棕木色（提亮） */
    --bg-2: #3a2c1d;
    --panel: #3c2f24;
    --border: #5a4a36;
    --text: #f0e8d8;
    --text-dim: #a89a82;
    --accent: #e8b95a;
    --accent-2: #d4a04a;
    --leather: #2c1f12;       /* 内部皮革（提亮） */
    --leather-2: #1a120a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Helvetica Neue', Helvetica, 'Inter', -apple-system, BlinkMacSystemFont,
                 system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--text);
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background-color: var(--bg);
    /* 多层木纹叠加 */
    background-image:
      /* 极细纵向毛发 */
      repeating-linear-gradient(90deg,
        rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px,
        transparent 1px, transparent 4px),
      /* 中频纵纹（木质感） */
      repeating-linear-gradient(90deg,
        rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 60px,
        rgba(0,0,0,0.02) 60px, rgba(0,0,0,0.02) 120px),
      /* 大块光晕渐变 */
      radial-gradient(ellipse at 50% -20%, #5a4632 0%, #382a1d 70%);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ========== Topbar：拉丝金属面板 ========== */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 18px;
    background:
      /* 拉丝纹理 */
      repeating-linear-gradient(180deg,
        rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px,
        transparent 1px, transparent 2px),
      linear-gradient(180deg, #5a4838 0%, #3c2c1c 100%);
    border-bottom: 1px solid #1a1208;
    box-shadow:
      inset 0 -1px 0 rgba(0,0,0,0.6),
      0 1px 0 rgba(255,255,255,0.05);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .logo-mark {
    width: 22px; height: 22px;
    border: 1px solid #b8a585;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.15),
      0 1px 1px rgba(0,0,0,0.4);
  }
  .logo-mark::after {
    content: '';
    width: 5px; height: 5px;
    background: #b8a585;
    border-radius: 50%;
  }
  .logo-text {
    font-size: 13px;
    font-weight: 200;
    letter-spacing: 6px;
    color: #d8c8a8;
    text-shadow: 0 1px 1px rgba(0,0,0,0.5);
  }
  .logo-version {
    font-size: 9px;
    color: #6a5a44;
    letter-spacing: 2px;
    margin-left: 4px;
  }

  /* 顶栏作者署名 */
  .brand-credit {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-left: 14px;
    padding-left: 14px;
    border-left: 1px solid rgba(255,255,255,0.12);
    font-size: 11px;
    color: #c8a878;
    letter-spacing: 0.3px;
  }

  /* 页脚卡片 */
  .site-footer {
    max-width: 1300px;
    margin: 28px auto 0;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background:
      repeating-linear-gradient(0deg,
        rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px,
        transparent 1px, transparent 3px),
      linear-gradient(180deg, #3c2e1e, #2c2014);
    text-align: center;
    font-size: 12px;
    color: #a89878;
    letter-spacing: 0.5px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .site-footer .footer-by {
    color: #8a7860;
    letter-spacing: 1px;
  }
  .site-footer .footer-source {
    color: #c8a878;
    font-size: 13px;
  }
  .site-footer .footer-handle {
    color: var(--accent);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.5px;
    text-decoration: none;
    transition: color 0.15s;
  }
  .site-footer a.footer-handle:hover {
    color: #f5d28a;
    text-decoration: underline;
  }
  .site-footer .footer-divider {
    color: #5a4836;
    margin: 0 2px;
    font-weight: 300;
  }
  .site-footer .footer-link {
    color: #a89878;
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.5px;
    transition: color 0.15s;
  }
  .site-footer .footer-link:hover {
    color: var(--accent);
    text-decoration: underline;
  }

  .lang-toggle {
    display: inline-flex;
    background: #1a120a;
    border: 1px solid #2a1f12;
    border-radius: 4px;
    padding: 2px;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
  }
  .lang-btn {
    padding: 5px 11px;
    background: transparent;
    border: none;
    color: #8a7d6a;
    font-size: 11px;
    cursor: pointer;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: 1px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .lang-btn.active {
    background: linear-gradient(180deg, #3a2c18, #2c2014);
    color: var(--accent);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* ========== Main ========== */
  main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 16px 18px 60px;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .btn {
    padding: 7px 14px;
    background: linear-gradient(180deg, #4a3a28, #38281a);
    border: 1px solid #6a4f30;
    border-radius: 4px;
    color: #ece4d4;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.4px;
    transition: all 0.15s;
    font-family: inherit;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.08),
      0 1px 2px rgba(0,0,0,0.4);
  }
  .btn:hover { background: linear-gradient(180deg, #5a4630, #4a3422); border-color: #8a6438; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: linear-gradient(180deg, #604a26, #44301c);
    border-color: #8a6432;
    color: var(--accent);
  }
  .btn-primary:hover:not(:disabled) {
    background: linear-gradient(180deg, #705630, #503a20);
    border-color: #a87a3c;
  }

  /* ========== Canvas ========== */
  .canvas-area {
    background:
      /* 细噪点格子 */
      repeating-linear-gradient(45deg,
        #2a1f12 0px, #2a1f12 8px,
        #322516 8px, #322516 16px);
    border: 1px solid #5a4836;
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 14px;
    text-align: center;
    min-height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      inset 0 2px 8px rgba(0,0,0,0.5),
      0 1px 0 rgba(255,255,255,0.04);
  }
  #preview {
    max-width: 100%;
    max-height: 55vh;
    border-radius: 2px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
  }
  .upload-prompt {
    color: #8a7a60;
    padding: 50px 20px;
    border: 1px dashed #6a5538;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    max-width: 460px;
    transition: all 0.2s;
  }
  .upload-prompt:hover, .upload-prompt.dragover {
    border-color: #c8a878;
    color: #e0c898;
  }
  .upload-icon {
    width: 38px; height: 38px;
    border: 1px solid currentColor;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    font-size: 18px;
    opacity: 0.7;
  }
  .prompt-line1 { font-size: 13px; }
  .prompt-line2 { font-size: 11px; opacity: 0.7; margin-top: 4px; letter-spacing: 1px; }
  .prompt-privacy {
    font-size: 10.5px;
    color: #8a7a60;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.07);
    letter-spacing: 0.5px;
  }

  /* ========== Pedalboard Wrap：木纹外框 ========== */
  .pedalboard-wrap {
    background:
      /* 极细木纹 */
      repeating-linear-gradient(0deg,
        rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px,
        transparent 1px, transparent 3px),
      /* 大块木色变化 */
      repeating-linear-gradient(180deg,
        rgba(255,200,140,0.03) 0px, rgba(255,200,140,0.03) 80px,
        rgba(0,0,0,0.025) 80px, rgba(0,0,0,0.025) 160px),
      linear-gradient(180deg, #5a4632 0%, #3c2c1d 100%);
    border: 1px solid #6a5238;
    border-radius: 8px;
    box-shadow:
      0 6px 24px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .pedalboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid #2a1c10;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.08));
    box-shadow: inset 0 -1px 0 rgba(255,255,255,0.05);
  }
  .pedalboard-title {
    font-size: 10px;
    color: #d8c8a8;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    text-shadow: 0 1px 1px rgba(0,0,0,0.4);
  }
  .pedalboard-hint {
    font-size: 10px;
    color: #8a7a60;
  }

  /* 内部"舞台"：深皮革（提亮） */
  .pedalboard {
    position: relative;
    background:
      /* 皮革纹路 */
      radial-gradient(circle at 25% 30%, rgba(255,255,255,0.03) 0%, transparent 0.2%),
      radial-gradient(circle at 75% 60%, rgba(0,0,0,0.04) 0%, transparent 0.3%),
      radial-gradient(ellipse at 50% 50%, var(--leather) 0%, var(--leather-2) 100%);
    box-shadow:
      inset 0 6px 14px rgba(0,0,0,0.55),
      inset 0 -2px 6px rgba(0,0,0,0.4);
  }
  .cables {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: visible;
  }
  .cable-path {
    fill: none;
    stroke: #0a0805;
    stroke-width: 4;
    stroke-linecap: round;
  }
  .cable-path.active {
    stroke: #d8d8d8;
  }

  .pedals-grid {
    position: relative;
    z-index: 2;
    padding: 24px 12px 22px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 24px 14px;
  }
  /* 宽屏：强制 8 列一排（所有效果器一行放下） */
  @media (min-width: 1180px) {
    .pedals-grid {
      grid-template-columns: repeat(8, 1fr);
      gap: 24px 12px;
    }
  }

  /* ========== Pedal：写实风 ========== */
  .pedal {
    --body: #555;
    --body-2: #444;
    --led: #ff5050;
    --txt: #ffffff;
    --txt-shadow: rgba(0,0,0,0.55);
    --plate: rgba(0,0,0,0.18);

    background:
      /* 顶部高光带 */
      linear-gradient(180deg,
        rgba(255,255,255,0.32) 0%,
        rgba(255,255,255,0.12) 1.8%,
        transparent 6%),
      /* 底部阴影 */
      linear-gradient(0deg,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.15) 4%,
        transparent 8%),
      /* 主体 */
      linear-gradient(180deg, var(--body), var(--body-2));
    border-radius: 5px;
    padding: 9px 8px 10px;
    box-shadow:
      /* 落地阴影 */
      0 8px 18px rgba(0,0,0,0.65),
      0 3px 6px rgba(0,0,0,0.45),
      /* 顶部高光线 */
      inset 0 1px 0 rgba(255,255,255,0.22),
      /* 边缘暗线 */
      inset 0 0 0 1px rgba(0,0,0,0.25),
      /* 底部暗 */
      inset 0 -1px 0 rgba(0,0,0,0.5);
    position: relative;
    user-select: none;
    -webkit-user-select: none;
    cursor: grab;
    min-width: 0;
    transition: filter 0.15s, box-shadow 0.15s;
  }
  .pedal:active { cursor: grabbing; }
  .pedal.dragging { opacity: 0.5; }
  .pedal.drag-over {
    box-shadow:
      0 0 0 2px var(--accent),
      0 8px 22px rgba(212,160,74,0.5);
  }
  .pedal.bypassed { filter: brightness(0.55) saturate(0.5); }

  /* 顶部插孔：金属圆环 + 黑孔 */
  .pedal-jack {
    position: absolute;
    width: 11px; height: 11px;
    background:
      /* 中央黑洞 */
      radial-gradient(circle at 50% 50%,
        #000 0%, #000 38%,
        #2a2a2a 42%, #4a4a4a 50%,
        #888 70%, #6a6a6a 100%);
    border-radius: 50%;
    top: -5.5px;
    z-index: 4;
    box-shadow:
      0 0 0 1px #1a1a1a,
      0 1px 2px rgba(0,0,0,0.6);
  }
  .pedal-jack.in { left: 30%; transform: translateX(-50%); }
  .pedal-jack.out { right: 30%; transform: translateX(50%); }

  /* 底部螺丝（已移除 — 由箭头按钮替代）*/

  .pedal-name {
    text-align: center;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: var(--txt);
    text-shadow: 0 1px 1.5px var(--txt-shadow);
    margin-top: 5px;
    margin-bottom: 1px;
    padding: 0 6px;
    line-height: 1.1;
  }
  .pedal-sub {
    text-align: center;
    font-size: 7.5px;
    letter-spacing: 2.5px;
    color: var(--txt);
    opacity: 0.6;
    margin-bottom: 7px;
    font-weight: 600;
    text-transform: uppercase;
  }

  /* 旋钮控制板：凹陷 */
  .pedal-knobs {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 4px 2px;
    padding: 6px 4px 5px;
    margin: 0 1px;
    background: var(--plate);
    border-radius: 3px;
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.55),
      inset 0 -1px 0 rgba(255,255,255,0.07),
      0 1px 0 rgba(255,255,255,0.06);
  }
  .pedal-knobs.cols-3 { grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .knob-cell {
    display: flex; flex-direction: column; align-items: center;
    min-width: 0;
  }

  /* 旋钮：铬合金外圈 + 金属表面 */
  .knob {
    width: 32px; height: 32px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 25%,
        #707070 0%,
        #2a2a2a 65%,
        #1a1a1a 100%);
    box-shadow:
      /* 铬合金圈 */
      0 0 0 1px #050505,
      0 0 0 2.5px #888,
      0 0 0 3.5px #1a1a1a,
      /* 落地阴影 */
      0 2px 5px rgba(0,0,0,0.7),
      /* 内部光泽 */
      inset 0 1px 1px rgba(255,255,255,0.18),
      inset 0 -2px 3px rgba(0,0,0,0.6);
    position: relative;
    cursor: ns-resize;
    touch-action: none;
    margin: 2px 0 0;
  }
  .knob-indicator {
    position: absolute;
    top: 3px; left: 50%;
    width: 2.5px; height: 9px;
    background: #f5f5f5;
    border-radius: 1px;
    transform: translateX(-50%) rotate(0deg);
    transform-origin: 50% 13px;
    box-shadow: 0 0 1px rgba(0,0,0,0.6);
  }
  .knob-label {
    font-size: 7px;
    letter-spacing: 0.5px;
    color: var(--txt);
    opacity: 0.85;
    margin-top: 4px;
    font-weight: 700;
    text-transform: uppercase;
    text-align: center;
    white-space: nowrap;
    max-width: 100%;
    overflow: hidden;
    text-shadow: 0 1px 1px var(--txt-shadow);
  }

  .pedal-foot {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 7px;
    padding-bottom: 6px;
  }

  /* LED：金属圈 + 内嵌灯 */
  .led {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #2a0808;
    margin-bottom: 6px;
    cursor: pointer;
    box-shadow:
      0 0 0 1px #050505,
      0 0 0 2px #888,
      0 0 0 3px #1a1a1a,
      inset 0 1px 1px rgba(0,0,0,0.7);
    transition: all 0.2s;
  }
  .led.on {
    background: var(--led);
    box-shadow:
      0 0 0 1px #050505,
      0 0 0 2px #888,
      0 0 0 3px #1a1a1a,
      0 0 10px var(--led),
      0 0 4px var(--led),
      inset 0 -1px 1px rgba(255,255,255,0.5);
  }

  /* 脚踏开关：金属圈 + 中央按钮（变大） */
  .footswitch {
    width: 28px; height: 28px;
    background:
      radial-gradient(circle at 30% 30%, #c8c8c8 0%, #6a6a6a 50%, #1a1a1a 100%);
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    box-shadow:
      0 0 0 2px #050505,
      0 0 0 4px #888,
      0 0 0 5.5px #1a1a1a,
      0 3px 7px rgba(0,0,0,0.75),
      inset 0 1.5px 2px rgba(255,255,255,0.3),
      inset 0 -2px 3px rgba(0,0,0,0.6);
    margin-top: 2px;
    transition: transform 0.05s;
  }
  .footswitch:active { transform: translateY(1px); }
  .footswitch::after {
    /* 顶部金属反光 */
    content: '';
    position: absolute;
    top: 4px; left: 6px;
    width: 8px; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    filter: blur(1px);
    pointer-events: none;
  }

  /* 重排按钮：左下、右下角，常显 */
  .pedal-controls {
    position: absolute;
    bottom: 4px;
    left: 4px; right: 4px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    z-index: 3;
  }
  .ctrl-btn {
    pointer-events: auto;
    width: 20px; height: 18px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 3px;
    color: rgba(255,255,255,0.95);
    font-size: 10px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.12),
      0 1px 2px rgba(0,0,0,0.5);
    transition: all 0.1s;
  }
  .ctrl-btn:hover, .ctrl-btn:active {
    background: rgba(0,0,0,0.85);
    border-color: rgba(255,255,255,0.4);
  }

  /* ========== 各 Pedal 经典外观 ========== */
  /* Fuzz Face — 深蓝 */
  .pedal[data-fx="fuzz"] {
    --body: #2a5099;
    --body-2: #163d80;
    --led: #ff5050;
  }
  /* Boss DS-1 — 鲜橙 */
  .pedal[data-fx="distortion"] {
    --body: #f5a020;
    --body-2: #c87b10;
    --led: #ff3030;
    --txt: #1a1a1a;
    --txt-shadow: rgba(255,255,255,0.25);
    --plate: rgba(255,255,255,0.2);
  }
  /* Strymon Big Sky — 钢蓝 */
  .pedal[data-fx="reverb"] {
    --body: #2a5078;
    --body-2: #163958;
    --led: #5fb0ff;
  }
  /* EHX Memory Man — 米白 */
  .pedal[data-fx="delay"] {
    --body: #e5e0d0;
    --body-2: #b8b0a0;
    --led: #ff5050;
    --txt: #1a1a1a;
    --txt-shadow: rgba(255,255,255,0.5);
    --plate: rgba(0,0,0,0.08);
  }
  /* EHX Polychorus — 银色 */
  .pedal[data-fx="chorus"] {
    --body: #d0d0d0;
    --body-2: #989898;
    --led: #5fffe0;
    --txt: #1a1a1a;
    --txt-shadow: rgba(255,255,255,0.5);
    --plate: rgba(0,0,0,0.1);
  }
  /* MXR Phase 90 — 鲜橙 */
  .pedal[data-fx="phaser"] {
    --body: #ff8a38;
    --body-2: #c85820;
    --led: #ffffff;
    --txt: #1a1a1a;
    --txt-shadow: rgba(255,255,255,0.25);
    --plate: rgba(255,255,255,0.18);

    --body: #48b058;
    --body-2: #2c7038;
    --led: #80ff60;
  }
  /* Cry Baby — 黑色 */

    --body: #2a2a2a;
    --body-2: #0a0a0a;
    --led: #ffcf40;
  }

  /* ========== Status ========== */
  .status-bar {
    margin-top: 12px;
    padding: 8px 12px;
    background: linear-gradient(180deg, #3c2e1e, #2c2014);
    border: 1px solid #5a4836;
    border-radius: 4px;
    font-size: 11px;
    color: #c8b088;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .stat-on { color: var(--accent); font-weight: 600; }

  @media (max-width: 720px) {
    /* 顶栏不固定，让出更多视口给照片+效果器 */
    .topbar { padding: 9px 12px; position: static; }

    /* 照片粘在顶部，下面的效果器单独滑动；
       在 sticky-zone 内，所以滑过 pedalboard 末尾后会随页面继续滚动 */
    .sticky-zone .canvas-area {
      position: sticky;
      top: 0;
      z-index: 50;
      margin-bottom: 12px;
      box-shadow:
        inset 0 2px 8px rgba(0,0,0,0.5),
        0 6px 12px rgba(0,0,0,0.5);
    }
    /* 缩短预览高度，给下方效果器留空间 */
    #preview { max-height: 38vh; }
    .canvas-area { min-height: 160px; padding: 10px; }

    .logo-text { font-size: 11px; letter-spacing: 4px; }
    .logo-version { display: none; }
    .brand-credit {
      margin-left: 8px;
      padding-left: 8px;
      gap: 4px;
      font-size: 10px;
    }
    main { padding: 12px 12px 40px; }
    .toolbar .btn { padding: 7px 12px; font-size: 11px; }
    .pedals-grid {
      grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
      gap: 24px 14px;
      padding: 24px 10px 18px;
    }
    .pedal { padding: 8px 6px 26px; }   /* 给底部箭头留空间 */
    .pedal-name { font-size: 10px; letter-spacing: 1px; }
    .pedal-sub { font-size: 7px; letter-spacing: 2px; }
    .knob { width: 30px; height: 30px; }
    .knob-indicator { transform-origin: 50% 12px; height: 8px; }
    .footswitch { width: 26px; height: 26px; }
    .status-bar { font-size: 10px; gap: 12px; padding: 6px 10px; }
    .pedalboard-hint { display: none; }
    .ctrl-btn { width: 22px; height: 20px; font-size: 11px; }
  }
  @media (max-width: 380px) {
    .pedals-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 22px 10px;
    }
    .knob { width: 28px; height: 28px; }
    .knob-indicator { transform-origin: 50% 11px; height: 7px; }
  }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #1a120a; }
  ::-webkit-scrollbar-thumb { background: #4a3a28; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #6a4d28; }

  /* ========== 教程按钮（强调） ========== */
  .btn-guide {
    background: linear-gradient(180deg, #d4a04a 0%, #a87a2c 100%);
    border-color: #e8b95a;
    color: #1a1208;
    font-weight: 700;
    text-shadow: 0 1px 0 rgba(255,255,255,0.2);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.4),
      inset 0 -1px 0 rgba(0,0,0,0.25),
      0 2px 4px rgba(0,0,0,0.5);
  }
  .btn-guide:hover {
    background: linear-gradient(180deg, #e8b85a 0%, #b8862f 100%);
    border-color: #f0c870;
  }

  /* ========== 教程模态 ========== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    display: none;
    z-index: 1000;
    overflow-y: auto;
    padding: 24px;
  }
  .modal-backdrop.open {
    display: block;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background:
      repeating-linear-gradient(0deg,
        rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px,
        transparent 1px, transparent 3px),
      linear-gradient(180deg, #4a3826 0%, #322516 100%);
    border: 1px solid #6a5238;
    border-radius: 8px;
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 28px 24px;
    position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    color: #e8d8c0;
  }
  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    width: 32px; height: 32px;
    background: rgba(0,0,0,0.4);
    border: 1px solid #6a5238;
    color: #e8c898;
    border-radius: 4px;
    cursor: pointer;
    font-size: 20px;
    line-height: 28px;
    text-align: center;
    font-family: inherit;
    transition: all 0.15s;
  }
  .modal-close:hover { background: rgba(0,0,0,0.7); border-color: var(--accent); color: var(--accent); }

  .modal h1 {
    font-size: 18px;
    font-weight: 200;
    letter-spacing: 5px;
    color: var(--accent);
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .modal h1 + .modal-sub {
    font-size: 11px;
    color: #a89a82;
    letter-spacing: 2px;
    margin-bottom: 22px;
    padding-bottom: 16px;
    border-bottom: 1px solid #5a4836;
  }
  .modal h2 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    margin-top: 22px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .modal h2:first-of-type { margin-top: 0; }
  .modal p {
    font-size: 13px;
    line-height: 1.7;
    color: #d8c8a8;
    margin-bottom: 10px;
  }
  .modal ol, .modal ul {
    padding-left: 22px;
    margin-bottom: 12px;
  }
  .modal li {
    font-size: 13px;
    line-height: 1.7;
    color: #d8c8a8;
    margin-bottom: 5px;
  }
  .modal strong { color: var(--accent); font-weight: 600; }
  .modal kbd {
    display: inline-block;
    padding: 1px 6px;
    background: #2a2014;
    border: 1px solid #5a4836;
    border-radius: 3px;
    font-size: 11px;
    color: #e8c898;
    font-family: inherit;
    box-shadow: 0 1px 0 #1a120a;
  }

  .modal-fx-list { margin-top: 4px; }
  .modal-fx {
    padding: 14px 16px;
    margin-bottom: 12px;
    background: rgba(0,0,0,0.18);
    border: 1px solid #5a4836;
    border-left: 3px solid var(--fx-color, var(--accent));
    border-radius: 4px;
  }
  .modal-fx-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .modal-fx-name {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: #f0e0c0;
  }
  .modal-fx-tag {
    font-size: 11px;
    color: var(--fx-color, var(--accent));
    letter-spacing: 1px;
    font-weight: 600;
  }
  .modal-fx-desc {
    font-size: 12.5px;
    line-height: 1.6;
    color: #c8b898;
    margin-bottom: 8px;
  }
  .modal-fx-knobs {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 4px 14px;
  }
  .modal-knob {
    font-size: 11.5px;
    line-height: 1.5;
    color: #b8a888;
  }
  .modal-knob-name {
    color: var(--accent);
    font-weight: 700;
    margin-right: 4px;
  }

  @media (max-width: 720px) {
    .modal-backdrop { padding: 12px; }
    .modal { padding: 22px 18px 20px; }
    .modal h1 { font-size: 15px; letter-spacing: 3px; }
    .modal h2 { font-size: 12px; }
    .modal p, .modal li { font-size: 12px; }
    .modal-fx-knobs { grid-template-columns: 1fr; }
  }
</style>
</head>

  const parts = path.split('.');
  let v = I18N[currentLang];
  for (const p of parts) v = v?.[p];

}

  currentLang = lang;
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  try { localStorage.setItem('pedalboard-lang', lang); } catch (e) {}
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang)

  renderPedalboard();

  const modal = document.getElementById('guide-modal');
  if (modal && modal.classList.contains('open')) {
    document.getElementById('guide-content').innerHTML = buildGuideHtml();

}

/* ============================================================
   工具函数
   ============================================================ */
function clamp(x, lo=0, hi=255) { return x < lo ? lo : x > hi ? hi : x; }

function cloneImageData(src) {
  const dst = new ImageData(src.width, src.height);
  dst.data.set(src.data);
  return dst;
}

function boxBlur(src, radius) {
  if (radius < 1) return src;
  const w = src.width, h = src.height;
  const r = Math.round(radius);
  const tmp = new Uint8ClampedArray(src.data.length);
  const out = new Uint8ClampedArray(src.data.length);

  for (let y = 0; y < h; y++) {
    let rs=0, gs=0, bs=0, as=0;
    const row = y * w * 4;
    for (let x = -r; x <= r; x++) {
      const xi = Math.max(0, Math.min(w-1, x));
      const i = row + xi*4;
      rs += src.data[i]; gs += src.data[i+1]; bs += src.data[i+2]; as += src.data[i+3];
    }
    const div = r*2+1;
    for (let x = 0; x < w; x++) {
      const i = row + x*4;
      tmp[i] = rs/div; tmp[i+1] = gs/div; tmp[i+2] = bs/div; tmp[i+3] = as/div;
      const xOut = Math.max(0, Math.min(w-1, x - r));
      const xIn  = Math.max(0, Math.min(w-1, x + r + 1));
      const iOut = row + xOut*4;
      const iIn  = row + xIn*4;
      rs += src.data[iIn] - src.data[iOut];
      gs += src.data[iIn+1] - src.data[iOut+1];
      bs += src.data[iIn+2] - src.data[iOut+2];
      as += src.data[iIn+3] - src.data[iOut+3];
    }
  }
  for (let x = 0; x < w; x++) {
    let rs=0, gs=0, bs=0, as=0;
    for (let y = -r; y <= r; y++) {
      const yi = Math.max(0, Math.min(h-1, y));
      const i = (yi*w + x)*4;
      rs += tmp[i]; gs += tmp[i+1]; bs += tmp[i+2]; as += tmp[i+3];
    }
    const div = r*2+1;
    for (let y = 0; y < h; y++) {
      const i = (y*w + x)*4;
      out[i] = rs/div; out[i+1] = gs/div; out[i+2] = bs/div; out[i+3] = as/div;
      const yOut = Math.max(0, Math.min(h-1, y - r));
      const yIn  = Math.max(0, Math.min(h-1, y + r + 1));
      const iOut = (yOut*w + x)*4;
      const iIn  = (yIn*w + x)*4;
      rs += tmp[iIn] - tmp[iOut];
      gs += tmp[iIn+1] - tmp[iOut+1];
      bs += tmp[iIn+2] - tmp[iOut+2];
      as += tmp[iIn+3] - tmp[iOut+3];
    }
  }
  const result = new ImageData(w, h);
  result.data.set(out);
  return result;
}

/* ============================================================
   效果器实现
   ============================================================ */
const FX = {
  fuzz(img, p) {
    const d = img.data;
    const gain = 1 + p.gain * 6;
    const fuzz = p.fuzz;
    const levels = Math.max(2, Math.round(16 - fuzz * 13));
    const tone = (p.tone - 0.5) * 60;
    const level = 0.5 + p.level;
    const noise = fuzz * 30;
    for (let i = 0; i < d.length; i += 4) {
      let r = d[i] * gain, g = d[i+1] * gain, b = d[i+2] * gain;
      r = clamp(r); g = clamp(g); b = clamp(b);
      r = Math.round(r / 255 * levels) / levels * 255;
      g = Math.round(g / 255 * levels) / levels * 255;
      b = Math.round(b / 255 * levels) / levels * 255;
      const gray = r * 0.299 + g * 0.587 + b * 0.114;
      const satMul = 1 + fuzz * 1.2;
      r = clamp(gray + (r - gray) * satMul);
      g = clamp(gray + (g - gray) * satMul);
      b = clamp(gray + (b - gray) * satMul);
      if (noise > 0) {
        let s = (i * 2654435761) | 0;
        s = (s ^ (s >>> 13)) | 0;
        s = (s * 1597334677) | 0;
        const nz = ((s & 0xff) / 255 - 0.5) * noise;
        r = clamp(r + nz); g = clamp(g + nz); b = clamp(b + nz);
      }
      r = clamp(r + tone); g = clamp(g + tone * 0.6); b = clamp(b - tone * 0.5);
      d[i] = clamp(r * level); d[i+1] = clamp(g * level); d[i+2] = clamp(b * level);
    }
    return img;
  },

  distortion(img, p) {
    const d = img.data;
    const drive = 1 + p.drive * 5;
    const sat = 1 + p.sat * 1.5;
    const tone = (p.tone - 0.5) * 50;
    const level = 0.5 + p.level;
    for (let i = 0; i < d.length; i += 4) {
      let r = (d[i] / 255) * 2 - 1;
      let g = (d[i+1] / 255) * 2 - 1;
      let b = (d[i+2] / 255) * 2 - 1;
      r = Math.tanh(r * drive); g = Math.tanh(g * drive); b = Math.tanh(b * drive);
      r = (r + 1) / 2 * 255; g = (g + 1) / 2 * 255; b = (b + 1) / 2 * 255;
      const gray = r * 0.299 + g * 0.587 + b * 0.114;
      r = clamp(gray + (r - gray) * sat);
      g = clamp(gray + (g - gray) * sat);
      b = clamp(gray + (b - gray) * sat);
      r = clamp(r + tone); b = clamp(b - tone);
      d[i] = clamp(r * level); d[i+1] = clamp(g * level); d[i+2] = clamp(b * level);
    }
    return img;
  },

  reverb(img, p) {
    const w = img.width, h = img.height;
    const minDim = Math.min(w, h);
    const baseR = Math.max(2, p.size * minDim * 0.07);
    const decay = 0.4 + p.decay * 0.55;
    const mix = p.mix;
    const taps = 3;
    const acc = new Float32Array(img.data.length);
    let amp = 1, weightSum = 0;
    for (let n = 1; n <= taps; n++) {
      const r = baseR * n;
      const blurred = boxBlur(img, r);
      const bd = blurred.data;
      for (let i = 0; i < acc.length; i += 4) {
        acc[i] += bd[i] * amp;
        acc[i+1] += bd[i+1] * amp;
        acc[i+2] += bd[i+2] * amp;
      }
      weightSum += amp;
      amp *= decay;
    }
    const out = img.data;
    for (let i = 0; i < out.length; i += 4) {
      const wr = acc[i] / weightSum;
      const wg = acc[i+1] / weightSum;
      const wb = acc[i+2] / weightSum;
      out[i]   = clamp(out[i]   * (1 - mix) + wr * mix);
      out[i+1] = clamp(out[i+1] * (1 - mix) + wg * mix);
      out[i+2] = clamp(out[i+2] * (1 - mix) + wb * mix);
    }
    return img;
  },

  delay(img, p) {
    const w = img.width, h = img.height;
    const time = p.time;
    const feedback = p.feedback;
    const angle = p.angle * Math.PI * 2;
    const mix = p.mix;
    const baseDx = Math.cos(angle) * time * w * 0.18;
    const baseDy = Math.sin(angle) * time * h * 0.18;
    const src = img.data;
    const accR = new Float32Array(w * h);
    const accG = new Float32Array(w * h);
    const accB = new Float32Array(w * h);
    let amp = 1, dx = baseDx, dy = baseDy, totalAmp = 0;
    for (let n = 0; n < 5 && amp > 0.06; n++) {
      const odx = Math.round(dx), ody = Math.round(dy);
      for (let y = 0; y < h; y++) {
        const sy = y - ody;
        if (sy < 0 || sy >= h) continue;
        for (let x = 0; x < w; x++) {
          const sx = x - odx;
          if (sx < 0 || sx >= w) continue;
          const di = y * w + x;
          const si = (sy * w + sx) * 4;
          accR[di] += src[si] * amp;
          accG[di] += src[si+1] * amp;
          accB[di] += src[si+2] * amp;
        }
      }
      totalAmp += amp;
      amp *= feedback;
      dx += baseDx; dy += baseDy;
    }
    if (totalAmp > 0) {
      for (let i = 0, p4 = 0; i < accR.length; i++, p4 += 4) {
        const wr = accR[i] / totalAmp;
        const wg = accG[i] / totalAmp;
        const wb = accB[i] / totalAmp;
        src[p4]   = clamp(src[p4]   * (1-mix) + wr * mix);
        src[p4+1] = clamp(src[p4+1] * (1-mix) + wg * mix);
        src[p4+2] = clamp(src[p4+2] * (1-mix) + wb * mix);
      }
    }
    return img;
  },

  chorus(img, p) {
    const w = img.width, h = img.height;
    const depth = p.depth * w * 0.04;
    const rate = 0.005 + (1 - p.rate) * 0.04;
    const mix = p.mix;
    const src = new Uint8ClampedArray(img.data);
    const out = img.data;
    for (let y = 0; y < h; y++) {
      const phase = y * rate;
      const offR = Math.round(Math.sin(phase) * depth);
      const offB = Math.round(Math.sin(phase + Math.PI * 0.66) * depth);
      const offG = Math.round(Math.sin(phase + Math.PI * 1.33) * depth * 0.4);
      const row = y * w;
      for (let x = 0; x < w; x++) {
        const i = (row + x) * 4;
        const xR = Math.max(0, Math.min(w-1, x + offR));
        const xG = Math.max(0, Math.min(w-1, x + offG));
        const xB = Math.max(0, Math.min(w-1, x + offB));
        const wetR = src[(row + xR) * 4];
        const wetG = src[(row + xG) * 4 + 1];
        const wetB = src[(row + xB) * 4 + 2];
        out[i]   = src[i]   * (1-mix) + wetR * mix;
        out[i+1] = src[i+1] * (1-mix) + wetG * mix;
        out[i+2] = src[i+2] * (1-mix) + wetB * mix;
      }
    }
    return img;
  },

  phaser(img, p) {
    const w = img.width, h = img.height;
    const depth = p.depth * 18;
    const rate = 0.005 + (1 - p.rate) * 0.04;
    const fb = p.feedback;
    const src = new Uint8ClampedArray(img.data);
    const out = img.data;
    const oyArr = new Int32Array(w);
    for (let x = 0; x < w; x++) oyArr[x] = Math.round(Math.sin(x * rate) * depth);
    const oxArr = new Int32Array(h);
    for (let y = 0; y < h; y++) oxArr[y] = Math.round(Math.cos(y * rate * 1.3 + Math.PI/4) * depth * fb);
    for (let y = 0; y < h; y++) {
      const ox = oxArr[y];
      for (let x = 0; x < w; x++) {
        const oy = oyArr[x];
        const sx = x + ox < 0 ? 0 : x + ox >= w ? w-1 : x + ox;
        const sy = y + oy < 0 ? 0 : y + oy >= h ? h-1 : y + oy;
        const di = (y * w + x) * 4;
        const si = (sy * w + sx) * 4;
        out[di]   = src[si];
        out[di+1] = src[si+1];
        out[di+2] = src[si+2];
        out[di+3] = src[si+3];
      }
    }
    return img;
  },

  tremolo(img, p) {
    const w = img.width, h = img.height;
    const rate = 0.02 + (1 - p.rate) * 0.18;
    const depth = p.depth;
    const angle = p.angle * Math.PI * 2;
    const cos = Math.cos(angle), sin = Math.sin(angle);
    const d = img.data;
    const xPart = new Float32Array(w);
    for (let x = 0; x < w; x++) xPart[x] = x * cos * rate;
    const yPart = new Float32Array(h);
    for (let y = 0; y < h; y++) yPart[y] = y * sin * rate;
    for (let y = 0; y < h; y++) {
      const yp = yPart[y];
      for (let x = 0; x < w; x++) {
        const mod = 1 - depth + depth * (Math.sin(xPart[x] + yp) * 0.5 + 0.5);
        const i = (y * w + x) * 4;
        d[i]   *= mod;
        d[i+1] *= mod;
        d[i+2] *= mod;
      }
    }
    return img;
  },

  wah(img, p) {
    const w = img.width, h = img.height;
    const pos = p.pos * h;
    const width = Math.max(20, p.width * h);
    const q = p.q;
    const blurred = boxBlur(img, 2);
    const bd = blurred.data;
    const d = img.data;
    for (let y = 0; y < h; y++) {
      const dist = Math.abs(y - pos);
      const weight = Math.exp(-(dist * dist) / (2 * (width * 0.5) ** 2));
      const sharpAmt = weight * (0.6 + q * 1.4);
      const huePush = weight * q * 60;
      for (let x = 0; x < w; x++) {
        const i = (y * w + x) * 4;
        const ur = d[i]   + (d[i]   - bd[i])   * sharpAmt;
        const ug = d[i+1] + (d[i+1] - bd[i+1]) * sharpAmt;
        const ub = d[i+2] + (d[i+2] - bd[i+2]) * sharpAmt;
        d[i]   = clamp(ur + huePush * 0.7);
        d[i+1] = clamp(ug + huePush * 0.3);
        d[i+2] = clamp(ub - huePush * 0.5);
      }
    }
    return img;
  }
};

/* ============================================================
   渲染
   ============================================================ */
const previewCanvas = document.getElementById('preview');
const previewCtx = previewCanvas.getContext('2d', { willReadFrequently: true });

let renderScheduled = false;
function scheduleRender() {
  if (renderScheduled) return;
  renderScheduled = true;
  requestAnimationFrame(() => {
    renderScheduled = false;
    renderPreview();
  });
}

function renderPreview() {
  if (!state.originalImageData) return;
  // 没有任何效果开启时，直接 putImageData 跳过 clone + 处理
  const activeSlots = state.chain.filter(s => s.on);
  if (activeSlots.length === 0) {
    previewCtx.putImageData(state.originalImageData, 0, 0);
    document.getElementById('stat-active').textContent = '0';
    document.getElementById('stat-time').textContent = '0 ms';
    return;
  }
  const t0 = performance.now();
  let work = cloneImageData(state.originalImageData);
  for (const slot of activeSlots) {
    work = FX[slot.fx](work, slot.params) || work;
  }
  previewCtx.putImageData(work, 0, 0);
  const dt = performance.now() - t0;
  document.getElementById('stat-active').textContent = activeSlots.length;
  document.getElementById('stat-time').textContent = dt.toFixed(0) + ' ms';
}

/* ============================================================
   图片加载（手机端做了大量优化）
   ============================================================ */

// 预览尺寸根据屏幕自适应：手机用更小的 backing canvas
function getPreviewMax() {
  const w = window.innerWidth;
  if (w < 480) return 420;     // 小屏手机
  if (w < 720) return 560;     // 大屏手机/小平板
  return 720;                  // 桌面
}

function loadImage(src, revokeUrl) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    state.originalImg = img;
    state.fullW = img.naturalWidth;
    state.fullH = img.naturalHeight;
    const PREVIEW_MAX = getPreviewMax();
    let pw = state.fullW, ph = state.fullH;
    if (Math.max(pw, ph) > PREVIEW_MAX) {
      const ratio = PREVIEW_MAX / Math.max(pw, ph);
      pw = Math.round(pw * ratio);
      ph = Math.round(ph * ratio);
    }
    state.previewW = pw; state.previewH = ph;
    previewCanvas.width = pw;
    previewCanvas.height = ph;
    previewCtx.drawImage(img, 0, 0, pw, ph);
    state.originalImageData = previewCtx.getImageData(0, 0, pw, ph);
    document.getElementById('upload-prompt').style.display = 'none';
    previewCanvas.hidden = false;
    document.getElementById('download-btn').disabled = false;
    document.getElementById('stat-res').textContent = `${state.fullW} × ${state.fullH}` +
      (pw !== state.fullW ? ` (preview ${pw}×${ph})` : '');
    if (revokeUrl) URL.revokeObjectURL(revokeUrl);
    scheduleRender();
  };
  img.onerror = () => {
    if (revokeUrl) URL.revokeObjectURL(revokeUrl);
    alert(currentLang === 'zh' ? '图片加载失败' : 'Failed to load image');
  };
  img.src = src;
}

// 用 createObjectURL 替代 FileReader.readAsDataURL —— 不需要 base64 编码整张图，手机端速度提升 5-10×
function loadImageFromFile(f) {
  if (!f || !f.type.startsWith('image/')) return;
  const url = URL.createObjectURL(f);
  loadImage(url, url);
}

document.getElementById('upload-btn').onclick = () => document.getElementById('file-input').click();
document.getElementById('file-input').onchange = (e) => loadImageFromFile(e.target.files[0]);

const canvasArea = document.getElementById('canvas-area');
const uploadPrompt = document.getElementById('upload-prompt');
['dragenter','dragover'].forEach(e => canvasArea.addEventListener(e, ev => {
  ev.preventDefault(); ev.stopPropagation();
  uploadPrompt.classList.add('dragover');
}));
['dragleave','drop'].forEach(e => canvasArea.addEventListener(e, ev => {
  ev.preventDefault(); ev.stopPropagation();
  uploadPrompt.classList.remove('dragover');
}));
canvasArea.addEventListener('drop', ev => loadImageFromFile(ev.dataTransfer.files[0]));
uploadPrompt.addEventListener('click', () =>
  document.getElementById('file-input').click()
);

/* ============================================================
   Pedalboard 渲染
   ============================================================ */
const pedalsGridEl = document.getElementById('pedals-grid');
const cablesSvg = document.getElementById('cables');

function renderPedalboard() {
  pedalsGridEl.innerHTML = '';
  state.chain.forEach((slot, idx) => {
    const def = EFFECTS[slot.fx];
    const pedal = document.createElement('div');
    pedal.className = 'pedal' + (slot.on ? '' : ' bypassed');
    pedal.dataset.fx = slot.fx;
    pedal.dataset.idx = idx;
    pedal.draggable = true;

    const knobsHtml = def.knobs.map(k => `
      <div class="knob-cell">
        <div class="knob" data-knob="${k.id}" title="${(slot.params[k.id]*100).toFixed(0)}">
          <div class="knob-indicator"></div>
        </div>
        <div class="knob-label">${t('knob.' + k.id)}</div>
      </div>
    `).join('');

    const cls = def.knobs.length === 3 ? 'cols-3' : '';

    pedal.innerHTML = `
      <div class="pedal-jack in"></div>
      <div class="pedal-jack out"></div>
      <div class="pedal-name">${def.name}</div>
      <div class="pedal-sub">${t('sub.' + slot.fx)}</div>
      <div class="pedal-knobs ${cls}">${knobsHtml}</div>
      <div class="pedal-foot">
        <div class="led ${slot.on ? 'on' : ''}"></div>
        <div class="footswitch"></div>
      </div>
      <div class="pedal-controls">
        <button class="ctrl-btn" data-act="left">◀</button>
        <button class="ctrl-btn" data-act="right">▶</button>
      </div>
    `;

    /* 旋钮 */
    pedal.querySelectorAll('.knob').forEach(knobEl => {
      const knobId = knobEl.dataset.knob;
      const updateAngle = () => {
        const v = slot.params[knobId];
        const angle = (v - 0.5) * 270;
        knobEl.querySelector('.knob-indicator').style.transform =
          `translateX(-50%) rotate(${angle}deg)`;
        knobEl.title = (v * 100).toFixed(0);
      };
      updateAngle();
      let startY = 0, startV = 0, dragging = false;
      const onMove = (e) => {
        if (!dragging) return;
        e.preventDefault();
        const cy = e.clientY ?? e.touches?.[0]?.clientY;
        const dy = startY - cy;
        const newV = Math.max(0, Math.min(1, startV + dy / 200));
        slot.params[knobId] = newV;
        updateAngle();
        scheduleRender();
      };
      const onUp = () => {
        dragging = false;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
      };
      const onDown = (e) => {
        e.preventDefault(); e.stopPropagation();
        dragging = true;
        startY = e.clientY ?? e.touches?.[0]?.clientY;
        startV = slot.params[knobId];
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onUp);
      };
      knobEl.addEventListener('mousedown', onDown);
      knobEl.addEventListener('touchstart', onDown, { passive: false });
      knobEl.addEventListener('dblclick', e => {
        e.stopPropagation();
        const def2 = EFFECTS[slot.fx].knobs.find(k => k.id === knobId);
        slot.params[knobId] = def2.default;
        updateAngle();
        scheduleRender();
      });
    });

    /* Footswitch / LED */
    const toggle = () => {
      slot.on = !slot.on;
      pedal.classList.toggle('bypassed', !slot.on);
      pedal.querySelector('.led').classList.toggle('on', slot.on);
      drawCables();
      scheduleRender();
    };
    pedal.querySelector('.footswitch').addEventListener('click', e => {
      e.stopPropagation(); toggle();
    });
    pedal.querySelector('.led').addEventListener('click', e => {
      e.stopPropagation(); toggle();
    });

    /* 移动按钮 */
    pedal.querySelectorAll('.ctrl-btn').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        const act = b.dataset.act;
        const i = idx;
        if (act === 'left' && i > 0) {
          [state.chain[i-1], state.chain[i]] = [state.chain[i], state.chain[i-1]];
        } else if (act === 'right' && i < state.chain.length - 1) {
          [state.chain[i], state.chain[i+1]] = [state.chain[i+1], state.chain[i]];
        }
        renderPedalboard();
        scheduleRender();
      });
    });

    /* 拖拽排序 */
    pedal.addEventListener('dragstart', e => {
      pedal.classList.add('dragging');
      e.dataTransfer.setData('text/plain', idx);
      e.dataTransfer.effectAllowed = 'move';
    });
    pedal.addEventListener('dragend', () => pedal.classList.remove('dragging'));
    pedal.addEventListener('dragover', e => {
      e.preventDefault();
      pedal.classList.add('drag-over');
    });
    pedal.addEventListener('dragleave', () => pedal.classList.remove('drag-over'));
    pedal.addEventListener('drop', e => {
      e.preventDefault();
      pedal.classList.remove('drag-over');
      const from = parseInt(e.dataTransfer.getData('text/plain'));
      const to = idx;
      if (from !== to) {
        const moved = state.chain.splice(from, 1)[0];
        state.chain.splice(to, 0, moved);
        renderPedalboard();
        scheduleRender();
      }
    });

    pedalsGridEl.appendChild(pedal);
  });

  requestAnimationFrame(drawCables);
}

/* ============================================================
   线缆绘制
   ============================================================ */
function drawCables() {
  while (cablesSvg.firstChild) cablesSvg.removeChild(cablesSvg.firstChild);
  const board = pedalsGridEl.parentElement;
  const boardRect = board.getBoundingClientRect();
  cablesSvg.setAttribute('viewBox', `0 0 ${boardRect.width} ${boardRect.height}`);
  cablesSvg.setAttribute('preserveAspectRatio', 'none');

  const pedals = Array.from(pedalsGridEl.querySelectorAll('.pedal'));
  const ns = 'http://www.w3.org/2000/svg';

  for (let i = 0; i < pedals.length - 1; i++) {
    const a = pedals[i].getBoundingClientRect();
    const b = pedals[i+1].getBoundingClientRect();
    const ax = a.left - boardRect.left + a.width * 0.7;
    const ay = a.top - boardRect.top + 1;
    const bx = b.left - boardRect.left + b.width * 0.3;
    const by = b.top - boardRect.top + 1;

    let path;
    const sameRow = Math.abs(ay - by) < 6;
    if (sameRow) {
      const arch = 14 + Math.min(40, Math.abs(bx - ax) * 0.15);
      const cp1x = ax + (bx - ax) * 0.25;
      const cp1y = ay - arch;
      const cp2x = ax + (bx - ax) * 0.75;
      const cp2y = by - arch;
      path = `M ${ax} ${ay} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${bx} ${by}`;
    } else {
      const peakY = Math.min(ay, by) - 22;
      const cp1x = ax + 16;
      const cp1y = peakY;
      const cp2x = bx - 16;
      const cp2y = peakY - 4;
      path = `M ${ax} ${ay} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${bx} ${by}`;
    }

    const isActive = state.chain[i].on && state.chain[i+1].on;
    const shadow = document.createElementNS(ns, 'path');
    shadow.setAttribute('d', path);
    shadow.setAttribute('class', 'cable-path');
    shadow.setAttribute('stroke-width', '5.5');
    shadow.setAttribute('stroke', 'rgba(0,0,0,0.7)');
    cablesSvg.appendChild(shadow);

    const main = document.createElementNS(ns, 'path');
    main.setAttribute('d', path);
    main.setAttribute('class', 'cable-path' + (isActive ? ' active' : ''));
    cablesSvg.appendChild(main);

    if (isActive) {
      const hi = document.createElementNS(ns, 'path');
      hi.setAttribute('d', path);
      hi.setAttribute('class', 'cable-path');
      hi.setAttribute('stroke-width', '1');
      hi.setAttribute('stroke', 'rgba(255,255,255,0.5)');
      cablesSvg.appendChild(hi);
    }
  }
}
window.addEventListener('resize', () => requestAnimationFrame(drawCables));

/* ============================================================
   工具栏按钮
   ============================================================ */
document.getElementById('reset-btn').onclick = () => {
  state.chain = defaultChain();
  renderPedalboard();
  scheduleRender();
};
document.getElementById('bypass-all-btn').onclick = () => {
  state.chain.forEach(s => s.on = false);
  renderPedalboard();
  scheduleRender();
};
document.getElementById('download-btn').onclick = () => {
  if (!state.originalImg) return;
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = state.fullW;
  exportCanvas.height = state.fullH;
  const ex = exportCanvas.getContext('2d');
  ex.drawImage(state.originalImg, 0, 0);
  let work = ex.getImageData(0, 0, state.fullW, state.fullH);
  for (const slot of state.chain) {
    if (slot.on) work = FX[slot.fx](work, slot.params) || work;
  }
  ex.putImageData(work, 0, 0);
  exportCanvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pedalboard-${Date.now()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 500);
  }, 'image/png');
};

document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => setLang(b.dataset.lang));
});

const guideModal = document.getElementById('guide-modal');
const guideContent = document.getElementById('guide-content');

function showGuide() {
  guideContent.innerHTML = buildGuideHtml();
  guideModal.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function hideGuide() {
  guideModal.classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('guide-btn').addEventListener('click', showGuide);
document.getElementById('guide-close').addEventListener('click', hideGuide);
guideModal.addEventListener('click', e => {
  if (e.target === guideModal) hideGuide();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && guideModal.classList.contains('open')) hideGuide();
});

setLang(currentLang);
